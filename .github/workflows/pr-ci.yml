name: PR Continuous Integration

on:
  pull_request:
    branches:
      - main

env:
  SOLUTION: '**/*.sln'
  BUILD_PLATFORM: x86
  BUILD_CONFIGURATION: Release
  DOTNET_INSTALL_DIR: '${{ github.workspace }}\\dotnet-x86'

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK (x86)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET 8 x86 runtime and SDK
        shell: pwsh
        run: |
          Invoke-WebRequest https://dot.net/v1/dotnet-install.ps1 -OutFile dotnet-install.ps1

          ./dotnet-install.ps1 `
            -Channel 8.0 `
            -Architecture x86 `
            -InstallDir "${env:DOTNET_INSTALL_DIR}" `
            -Runtime dotnet

          ./dotnet-install.ps1 `
            -Channel 8.0 `
            -Architecture x86 `
            -InstallDir "${env:DOTNET_INSTALL_DIR}"

          & "${env:DOTNET_INSTALL_DIR}\\dotnet.exe" --list-sdks
          & "${env:DOTNET_INSTALL_DIR}\\dotnet.exe" --list-runtimes

      - name: Install Visual C++ Redistributable x86
        shell: pwsh
        run: |
          $url = "https://aka.ms/vs/17/release/vc_redist.x86.exe"
          $output = "$env:TEMP\\vc_redist.x86.exe"

          Invoke-WebRequest -Uri $url -OutFile $output

          Start-Process `
            -FilePath $output `
            -ArgumentList '/install /quiet /norestart' `
            -Wait

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          $solution = Get-ChildItem -Recurse *.sln | Select-Object -First 1
          nuget restore $solution.FullName -ConfigFile nuget.config

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: pwsh
        run: |
          $solution = Get-ChildItem -Recurse *.sln | Select-Object -First 1

          if (-not $solution) {
            Write-Error "No solution file found."
            exit 1
          }

          Write-Host "Building solution: $($solution.FullName)"

          msbuild $solution.FullName `
            /p:Configuration=${env:BUILD_CONFIGURATION} `
            /p:Platform=${env:BUILD_PLATFORM} `
            /p:PlatformToolset=v143

      - name: Publish binaries
        shell: pwsh
        run: |
          $solution = Get-ChildItem -Recurse *.sln | Select-Object -First 1

          if (-not $solution) {
            Write-Error "No solution file found."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path artifacts

          msbuild $solution.FullName `
            /p:Configuration=${env:BUILD_CONFIGURATION} `
            /p:Platform=${env:BUILD_PLATFORM} `
            /p:OutputPath="${{ github.workspace }}\artifacts" `
            /p:PlatformToolset=v143

      - name: Set x86 DOTNET_ROOT
        shell: bash
        run: |
          echo "DOTNET_ROOT=${{ github.workspace }}\\dotnet-x86" >> $GITHUB_ENV
          echo "DOTNET_ROOT_X86=${{ github.workspace }}\\dotnet-x86" >> $GITHUB_ENV

      - name: Locate VSTest
        shell: pwsh
        run: |
          $vsTest = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio" `
            -Recurse vstest.console.exe `
            | Select-Object -First 1

          echo "VSTEST_PATH=$($vsTest.FullName)" >> $env:GITHUB_ENV

      - name: Run unit tests with coverage
        shell: pwsh
        env:
          DOTNET_ROOT: ${{ github.workspace }}\dotnet-x86          
          DOTNET_ROOT_X86: ${{ github.workspace }}\dotnet-x86
        run: |
          vstest.console.exe `
            .\\artifacts\\**\\*Tests.dll `
            /Platform:x86 `
            /EnableCodeCoverage `
            /Settings:coverlet.runsettings

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/
